<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC"/>
      <stop offset="100%" style="stop-color:#003d99"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001a4d" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background card -->
  <rect x="0" y="0" width="400" height="120" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Magnifying glass icon -->
  <g transform="translate(40, 30)">
    <!-- Glass circle -->
    <circle cx="20" cy="20" r="16" fill="none" stroke="#fff" stroke-width="4"/>
    <circle cx="20" cy="20" r="10" fill="rgba(255,255,255,0.15)"/>
    <!-- Handle -->
    <line x1="32" y1="32" x2="46" y2="46" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- ReviewBoard text -->
  <text x="130" y="58" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#fff">ReviewBoard</text>
  
  <!-- Subtitle -->
  <text x="132" y="82" font-family="Inter, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Peer Review System</text>
  
  <!-- Decorative dots -->
  <circle cx="370" cy="30" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="358" cy="40" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="375" cy="50" r="2" fill="rgba(255,255,255,0.25)"/>
</svg>
