{% extends 'base.html' %}
{% block title %}New Ticket – RB{% endblock %}
{% block extra_head %}
<!-- Flatpickr for modern date/time picker -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/pluginsconfirmdate/confirmdate.css">
<style>
  /* Custom Flatpickr styling for DD/MM/YYYY */
  .flatpickr-calendar {
    font-family: inherit;
  }
  .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange {
    background: #0d6efd !important;
    border-color: #0d6efd !important;
  }
  .flatpickr-day.inRange {
    background: #e6f0ff !important;
    border-color: #e6f0ff !important;
  }
  .flatpickr-time input.flatpickr-hour, .flatpickr-time input.flatpickr-minute {
    font-family: inherit;
  }
  /* Hide the original input when altInput is used - need !important to override form-control */
  #deadline.flatpickr-input {
    display: none !important;
    visibility: hidden !important;
    width: 0 !important;
    height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    border: none !important;
  }
  /* Style the altInput to look like form-control */
  .flatpickr-alt-input {
    background: white !important;
    border: 1px solid #ced4da !important;
    border-radius: 0.375rem !important;
    padding: 0.375rem 0.75rem !important;
    font-size: 1rem !important;
    width: 100% !important;
  }
  .flatpickr-alt-input:focus {
    border-color: #86b7fe !important;
    outline: 0 !important;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
  }
  /* Past date warning */
  .past-warning {
    background: #dc3545;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
    display: none;
  }
  .past-warning.show {
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
{% endblock %}
{% block content %}
<style>
  @media (max-width: 576px) {
    form { padding: 0 !important; }
    h2 { font-size: 1.3rem; }
    .form-control { font-size: 16px; }
  }
</style>
<h2 class="mb-4">Create New Ticket</h2>
<form method="post" enctype="multipart/form-data" id="ticket-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label" for="title">Title</label>
    <input type="text" class="form-control" id="title" name="title" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="description">Description</label>
    <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
  </div>
  <div class="mb-3">
    <label class="form-label" for="deadline">Deadline (optional)</label>
    <input type="text" class="form-control" id="deadline" name="deadline" placeholder="Click to select date & time">
    <div id="past-warning" class="past-warning">
      <span>⚠️</span>
      <span id="past-warning-text"></span>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label" for="pdf">PDF File (optional)</label>
    <input type="file" class="form-control" id="pdf" name="pdf" accept="application/pdf">
  </div>
  <button type="submit" class="btn btn-primary">Create Ticket</button>
</form>

<!-- Past date confirmation modal -->
<div class="modal fade" id="pastDateModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">⚠️ Past Date Selected</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>You have selected a date/time in the past!</p>
        <p><strong>Selected:</strong> <span id="modal-selected-date"></span></p>
        <p><strong>Current time (CET):</strong> <span id="modal-current-time"></span></p>
        <p class="mb-0">Do you want to proceed anyway?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Choose Different Date</button>
        <button type="button" class="btn btn-warning" id="confirm-past-date">Use This Date Anyway</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Get current CET time for display
  const now = new Date();
  const cetOffset = 1; // UTC+1
  const cetTime = new Date(now.getTime() + (now.getTimezoneOffset() + cetOffset * 60) * 60 * 1000);
  
  // Format CET time for display: DD/MM/YYYY HH:mm:ss CET
  function formatCET(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    const hours = String(date.getHours()).padStart(2, '0');
    const mins = String(date.getMinutes()).padStart(2, '0');
    const secs = String(date.getSeconds()).padStart(2, '0');
    return `${day}/${month}/${year} ${hours}:${mins}:${secs} CET`;
  }
  
  document.getElementById('modal-current-time').textContent = formatCET(cetTime);
  
  let pendingDeadline = null;
  let pastDateModal = null;
  
  // Initialize Bootstrap modal
  if (typeof bootstrap !== 'undefined') {
    pastDateModal = new bootstrap.Modal(document.getElementById('pastDateModal'));
  } else {
    // Fallback if Bootstrap JS not loaded
    pastDateModal = {
      show: () => document.getElementById('pastDateModal').style.display = 'block',
      hide: () => document.getElementById('pastDateModal').style.display = 'none'
    };
  }
  
  // Initialize Flatpickr with DD/MM/YYYY format and time picker
  const deadlinePicker = flatpickr('#deadline', {
    enableTime: true,
    time_24hr: true,
    dateFormat: "Y-m-d\\TH:i:S",  // ISO format for form submission (with seconds)
    altInput: true,
    altFormat: "D/M/Y H:i:S \\C\\E\\T",  // Human-readable: Wed/Mar/2026 12:03:00 CET
    minDate: "today",
    locale: "default",  // Use English locale for DD/MM/YYYY format
    plugins: [
      new confirmDatePlugin({
        confirmIcon: "<i class='fa fa-check'></i>",
        showAlways: false
      })
    ],
    onChange: function(selectedDates, dateStr, instance) {
      if (selectedDates.length === 0) {
        document.getElementById('past-warning').classList.remove('show');
        return;
      }
      
      const selected = selectedDates[0];
      const now = new Date();
      
      if (selected < now) {
        // Show inline warning
        document.getElementById('past-warning-text').textContent = 
          `Selected: ${formatCET(selected)} — This is in the past!`;
        document.getElementById('past-warning').classList.add('show');
        
        // Store pending deadline and show modal
        pendingDeadline = selected;
        document.getElementById('modal-selected-date').textContent = formatCET(selected);
        pastDateModal.show();
      } else {
        document.getElementById('past-warning').classList.remove('show');
        pendingDeadline = null;
      }
    }
  });
  
  // Confirm past date button
  document.getElementById('confirm-past-date').addEventListener('click', function() {
    pastDateModal.hide();
    // User confirmed, keep the past date
    pendingDeadline = null;
  });
  
  // Cancel/hide modal
  document.getElementById('pastDateModal').addEventListener('hidden.bs.modal', function() {
    if (pendingDeadline !== null) {
      // User cancelled, clear the date
      deadlinePicker.clear();
      document.getElementById('past-warning').classList.remove('show');
      pendingDeadline = null;
    }
  });
});
</script>
{% endblock %}
