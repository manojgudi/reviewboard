{% extends 'base.html' %}
{% block title %}Edit User – RB{% endblock %}
{% block content %}
<style>
  @media (max-width: 576px) {
    form { padding: 0 !important; }
    h2 { font-size: 1.3rem; }
    .form-control { font-size: 16px; }
  }
</style>
<h2 class="mb-4">Edit User {{ user.username }}</h2>
{% if is_self %}
<div class="alert alert-info mb-4">
  <strong>Note:</strong> You cannot change your own role. Ask another admin to do this.
</div>
{% endif %}
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label" for="full_name">Full Name</label>
    <input type="text" class="form-control" id="full_name" name="full_name" value="{{ user.full_name }}">
  </div>
  <div class="mb-3">
    <label class="form-label" for="email">Email</label>
    <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="role">Role</label>
    {% if is_self %}
    <input type="text" class="form-control" value="{{ user.role|capitalize }}" disabled>
    <input type="hidden" name="role" value="{{ user.role }}">
    {% else %}
    <select class="form-select" id="role" name="role">
      <option value="reviewer" {% if user.role == 'reviewer' %}selected{% endif %}>Reviewer</option>
      <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
    </select>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('admin.users') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
